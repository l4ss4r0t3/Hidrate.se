<head>

  <!-- ============================================================
       CONFIGURAÇÕES BÁSICAS
       Define o conjunto de caracteres, escala para mobile e título.
       ============================================================ -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <title>Hidrate.se | Sua Garrafa de Água Digital.</title>

  <!-- Descrição exibida nos resultados de busca do Google -->
  <meta name="description" content="Hidrate.se: Use sua Garrafa de Água Digital para controle seu consumo de água. Alcance sua meta de hidratação e cuide da sua saúde com a Hidrate.se.">

  <!-- Folha de estilos principal -->
  <link rel="stylesheet" href="style.css?v=3">

  <!-- Cor da barra do navegador no Android/Chrome -->
  <meta name="theme-color" content="#74ccf4">

  <!-- ============================================================
       OPEN GRAPH (OG)
       Controla como o site aparece ao ser compartilhado em redes
       sociais como WhatsApp, Facebook, LinkedIn, etc.
       ============================================================ -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Hidrate.se | Sua Garrafa de Água Digital.">
  <meta property="og:site_name" content="Hidrate.se">
  <meta property="og:description" content="Acompanhe sua meta de hidratação com uma garrafa de água digital e interativa.">

  <!-- Imagem de preview ao compartilhar o link (1220x640px) -->

  <meta property="og:image:width" content="1220">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type" content="image/png">

  <meta property="og:url" content="https://hidrate.se/">
  <meta property="og:locale" content="pt_BR">

  <!-- ============================================================
       FAVICONS
       Ícones do site exibidos na aba do navegador, tela inicial
       do celular (apple-touch-icon) e atalhos do Android.
       ============================================================ -->
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon_32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="images/favicon_64.png">

<body>

  <!-- ============================================================
       CABEÇALHO — MENU DROPDOWN
       O menu fica no canto superior direito e contém todos os
       controles do app: meta, quantidade a beber, botões e tema.
       A abertura/fechamento é controlada 100% pelo script.js.
       ============================================================ -->
  <header>
    <div class="dropdown">

      <!-- Botão que abre/fecha o menu (ícone hambúrguer em SVG) -->
      <button class="dropbtn" type="button" aria-label="Abrir Menu">
        <svg
          width="7mm"
          height="7mm"
          viewBox="0 0 7 7"
          preserveAspectRatio="xMidYMid meet"
          version="1.1"
          id="svg-menu"
          xmlns="http://www.w3.org/2000/svg">
          <!-- Três barras horizontais que formam o ícone hambúrguer -->
          <rect style="fill:black;stroke-width:0" width="5" height="1" x="1" y="1" />
          <rect style="fill:black;stroke-width:0" width="5" height="1" x="1" y="3" />
          <rect style="fill:black;stroke-width:0" width="5" height="1" x="1" y="5" />
        </svg>
      </button>

      <!-- Conteúdo do menu suspenso (oculto por padrão via CSS) -->
      <div class="dropdown-content">

        <!-- Label invisível para leitores de tela (acessibilidade) -->
        <label for="meta-input" class="sr-only">Sua Meta Diária (ml)</label>
        <!-- Campo para definir a capacidade/meta diária da garrafa -->
        <span class="input-wrapper">
          <span class="input-prefix">Meta</span>
          <input type="number" inputmode="numeric" id="meta-input" value="" placeholder="(em ml).">
        </span>

        <!-- Label invisível para leitores de tela (acessibilidade) -->
        <label for="ml-input" class="sr-only">Água a Beber (ml)</label>
        <!-- Campo para digitar a quantidade de água a ser bebida -->
        <span class="input-wrapper">
          <span class="input-prefix">Qtd.</span>
          <input type="number" inputmode="numeric" id="ml-input" placeholder="a beber (em ml).">
        </span>

        <!-- Registra a quantidade bebida e diminui o nível da garrafa -->
        <button type="button" id="btn-beber">Beber Água</button>

        <!-- Reseta o progresso, enchendo a garrafa novamente -->
        <button type="button" id="btn-zerar">Encher Garrafa</button>

        <!-- Inverte as cores da interface -->
        <button type="button" id="btn-tema">Inverter Cores</button>

        <!-- Link externo para o README do projeto no GitHub -->
        <a href="https://github.com/l4ss4r0t3/Hidrate.se/blob/main/README.md" target="_blank" class="menu-link">
          Manual / Sobre
        </a>

      </div>
    </div>
  </header>

  <!-- ============================================================
       GARRAFA DIGITAL (SVG)
       Representação visual da garrafa de água.
       O nível da água é controlado dinamicamente pelo script.js,
       que altera os atributos "height" e "y" do retângulo #agua-nivel.

       LÓGICA: a garrafa começa cheia e esvazia conforme o usuário
       registra o consumo. "Encher Garrafa" reseta para cheio.

       Estrutura do SVG (viewBox: 16x32 unidades):
       - clipPath         → limita a água ao interior da garrafa
       - rect #agua-nivel → nível da água (manipulado via JS)
       - g #pixels-garrafa → estrutura visual pixel a pixel
       - text #texto-ingerido → ml restantes (numerador do rótulo)
       - line #linha-fracao   → separador do rótulo (some quando vazia)
       - text #texto-meta     → meta diária (denominador do rótulo)

       INTEGRAÇÃO COM SCRIPT.JS:
       - ALTURA_MAX_SVG = 24  (interior: y=7 até y=31)
       - POSICAO_BASE_Y = 31  (base interna da garrafa)
       ============================================================ -->
  <main class="garrafa">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="32" viewBox="0 0 16 32">

  <!-- CAMADA 1: Nível da água — height e y controlados pelo script.js -->
  <!-- clipPath garante que a água não vaze para fora do interior da garrafa -->
  <defs>
    <clipPath id="clip-interior">
      <rect x="1" y="7" width="14" height="24"/>
    </clipPath>
  </defs>
  <!-- Começa com height=ALTURA_MAX_SVG e y=7 para exibir a garrafa cheia -->
  <rect
    id="agua-nivel"
    x="1" y="7" width="14" height="24"
    fill="#000075" fill-opacity="0.55"
    clip-path="url(#clip-interior)"/>
