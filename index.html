<!DOCTYPE html>
<html lang="pt-br">

<head>

  <!-- ============================================================
       📱 CONFIGURAÇÕES BÁSICAS DO DOCUMENTO
       Define charset UTF-8, viewport responsivo e título da página.
       user-scalable=no previne zoom acidental ao tocar nos inputs.
       ============================================================ -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hidrate.se | Sua Garrafa de Água Digital.</title>

  <!-- ============================================================
       🔍 SEO (OTIMIZAÇÃO PARA MECANISMOS DE BUSCA)
       Descrição que aparece nos resultados do Google e URL canônica.
       ============================================================ -->
  <meta name="description" content="Hidrate.se: Sua Garrafa de Água Digital. Acompanhe sua meta de hidratação com uma garrafa de água digital e interativa.">
  <link rel="canonical" href="https://hidrate.se/" />

  <!-- ============================================================
       🎨 FOLHAS DE ESTILO (CSS)
       Carregamento modular dos estilos por funcionalidade.
       ============================================================ -->
  <link rel="stylesheet" href="styles/body.css">      <!-- Estilos gerais do corpo -->
  <link rel="stylesheet" href="styles/bottles.css">   <!-- Estilos da garrafa SVG -->
  <link rel="stylesheet" href="styles/fonts.css">     <!-- Tipografia customizada -->
  <link rel="stylesheet" href="styles/menus.css">     <!-- Estilos do menu dropdown -->

  <!-- ============================================================
       🎨 TEMA DO NAVEGADOR
       Define a cor da barra de endereço no Chrome/Android.
       ============================================================ -->
  <meta name="theme-color" content="#74ccf4">

  <!-- ============================================================
       📤 OPEN GRAPH (COMPARTILHAMENTO EM REDES SOCIAIS)
       Controla a aparência do link ao ser compartilhado no
       WhatsApp, Facebook, LinkedIn, Twitter, etc.
       Imagem recomendada: 1200x630px
       ============================================================ -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Hidrate.se | Sua Garrafa de Água Digital.">
  <meta property="og:site_name" content="Hidrate.se">
  <meta property="og:description" content="Acompanhe sua meta de hidratação com uma garrafa de água digital e interativa.">
  <meta property="og:image" content="https://hidrate.se/images/pngs/ogs/og_1200_630.png">
  <meta property="og:image:width" content="1220">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type" content="image/png">
  <meta property="og:url" content="https://hidrate.se/">
  <meta property="og:locale" content="pt_BR">

  <!-- ============================================================
       🖼️ FAVICONS (ÍCONES DO SITE)
       Ícones exibidos na aba do navegador, na tela inicial do
       smartphone e em atalhos do Android/iOS.
       Tamanhos: 32x32, 64x64, 192x192 (Android), 180x180 (iOS)
       ============================================================ -->
  <link rel="icon" type="image/png" sizes="32x32" href="images/pngs/favicons/favicon_32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="images/pngs/favicons/favicon_64.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/pngs/favicons/favicon_192.png">
  <link rel="apple-touch-icon" href="images/pngs/favicons/favicon_180.png">

</head>

<body>
    
  <!-- ============================================================
       📋 CABEÇALHO — MENU DROPDOWN PRINCIPAL
       Menu suspenso no canto superior direito contendo:
       - Input de meta diária (ml)
       - Input de quantidade a beber (ml)
       - Botões de ação (beber, encher, tema)
       - Botão de autenticação (login/logout)
       - Links externos (manual, políticas, excluir conta)
       
       Comportamento: Abre/fecha via JavaScript (buttons.js)
       ============================================================ -->
  <header>
    <div class="dropdown">

      <!-- Botão de abertura do menu (ícone hambúrguer SVG) -->
      <button class="dropbtn" type="button" aria-label="Abrir Menu">
        <img src="images/svgs/buttons/burguer.svg" alt="Menu" width="24" height="24">        
      </button>

      <!-- Conteúdo do menu (inicialmente oculto via CSS) -->
      <div class="dropdown-content">

        <!-- ====================================================
             ⚠️ AVISO DE AUTENTICAÇÃO
             Exibido apenas quando usuário não está logado.
             Informa que dados não serão salvos sem login.
             Controlado por: onAuthStateChanged (Firebase)
             ==================================================== -->
        <p id="auth-warning" style="display:none; background-color: white; color: #ff4444; font-weight: bold; text-align: center; margin: 0; padding: 10px;">
          ⚠️ Faça login para SALVAR seus REGISTROS.
        </p>

        <!-- ====================================================
             🎯 INPUT: META DIÁRIA
             Define a quantidade de água (ml) a ser consumida no dia.
             Valor padrão: 2000ml
             Sincronizado com Firebase quando logado.
             ==================================================== -->
        <label for="meta-input">Sua Meta Diária</label>
        <span class="input-wrapper">
          <span class="input-prefix">Meta(ml)</span>
          <input type="number" inputmode="numeric" id="meta-input" value="2000">
        </span>

        <!-- ====================================================
             💧 INPUT: QUANTIDADE A BEBER
             Campo para registrar a quantidade de água consumida.
             Após clicar em "Beber Água", este valor é adicionado
             ao total e o campo é limpo automaticamente.
             ==================================================== -->
        <label for="ml-input">Água a Beber</label>
        <span class="input-wrapper">
          <span class="input-prefix">Qtd.(ml)</span>
          <input type="number" inputmode="numeric" id="ml-input">
        </span>

        <!-- ====================================================
             🔵 BOTÕES DE AÇÃO PRINCIPAL
             ==================================================== -->
        
        <!-- Registra o consumo de água e atualiza o visual da garrafa -->
        <button type="button" id="btn-beber">Beber Água</button>

        <!-- Reseta o progresso do dia, voltando a garrafa para cheia -->
        <button type="button" id="btn-zerar">Encher Garrafa</button>

        <!-- Alterna entre tema claro e escuro (filtro CSS invert) -->
        <button type="button" id="btn-tema">Inverter Cores</button>

        <!-- ====================================================
             🔐 BOTÃO DE AUTENTICAÇÃO (DINÂMICO)
             Texto e função mudam conforme estado de autenticação:
             - Deslogado: "Login com Google" → window.fazerLogin()
             - Logado: "Sair (Google)" → window.fazerLogout()
             Controlado por: onAuthStateChanged (Firebase)
             ==================================================== -->
        <button type="button" id="btn-auth">Login com Google</button>

        <!-- ====================================================
             📚 LINKS EXTERNOS
             ==================================================== -->
        
        <!-- Manual do usuário e informações sobre o projeto -->
        <a href="https://github.com/l4ss4r0t3/Hidrate.se/blob/main/README.md" target="_blank" class="menu-link">
          Manual / Sobre
        </a>

        <!-- Políticas legais do serviço -->
        <a href="policies/privacy.html" target="_blank" class="menu-link">Política de Privacidade</a>
        <a href="policies/service.html" target="_blank" class="menu-link">Termos de Serviço</a>
        
        <!-- Link para exclusão de conta (destaque em vermelho) -->
        <a href="policies/deletion.html" target="_blank" class="menu-link" style="color: #ff4444;">Excluir Conta</a>

      </div>
    </div>
  </header>

  <!-- ============================================================
       🍼 GARRAFA DIGITAL INTERATIVA (SVG EMBARCADO)
       
       Representação visual da meta de hidratação do dia.
       A garrafa começa CHEIA e ESVAZIA conforme o usuário
       registra o consumo de água.
       
       ESTRUTURA DO SVG (viewBox: 16x32 unidades):
       ┌─────────────────────────────────────────────────────┐
       │ • clipPath           → Máscara da forma da garrafa  │
       │ • rect #agua-nivel   → Nível da água (dinâmico)     │
       │ • g #pixels-garrafa  → Estrutura visual pixel art   │
       │ • text #texto-ingerido → ML restantes (topo)        │
       │ • line #linha-fracao   → Separador (/)              │
       │ • text #texto-meta     → Meta total (base)          │
       └─────────────────────────────────────────────────────┘
       
       DIMENSÕES INTERNAS (usadas em bottles.js):
       - ALTURA_MAX_SVG = 24  (espaço de y=7 até y=31)
       - POSICAO_BASE_Y = 31  (base interna da garrafa)
       
       MANIPULAÇÃO JAVASCRIPT:
       O script bottles.js acessa este SVG via contentDocument
       e altera dinamicamente os atributos 'height' e 'y' do
       elemento #agua-nivel para refletir o progresso do dia.
       
       COMPORTAMENTO:
       - Garrafa CHEIA = Meta ainda não alcançada (restam Xml)
       - Garrafa VAZIA = Meta batida! 🎉
       - Botão "Encher Garrafa" reseta para estado inicial
       ============================================================ -->
  <main class="garrafa">
    <object id="svg-garrafa" data="images/svgs/bottles/two.svg" type="image/svg+xml"></object>
  </main>

  <!-- ============================================================
       🔥 FIREBASE — BACKEND E AUTENTICAÇÃO
       
       Módulo ES6 que gerencia toda a lógica de backend:
       - Autenticação via Google (web e Android)
       - Sincronização em tempo real com Firestore
       - Persistência de dados do usuário (totalBebido, metaDiaria)
       
       FLUXO DE AUTENTICAÇÃO:
       1. Usuário clica em "Login com Google"
       2. onAuthStateChanged detecta mudança de estado
       3. Se logado: inicia listener do Firestore
       4. Toda mudança no banco atualiza automaticamente a UI
       
       EXPOSIÇÃO GLOBAL:
       As funções e instâncias Firebase são expostas em window
       para permitir acesso pelos scripts externos (bottles.js).
       ============================================================ -->
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { 
    getAuth, 
    GoogleAuthProvider, 
    signInWithPopup,
    signInWithRedirect,
    getRedirectResult, 
    onAuthStateChanged, 
    signOut, 
    signInWithCredential 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import { 
    getFirestore, 
    doc, 
    onSnapshot, 
    setDoc, 
    updateDoc, 
    increment 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import { firebaseConfig } from './scripts/config.js';

// 🔥 INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let unsubscribe = null;

// ======================================================
// 🔐 LOGIN
// ======================================================
window.fazerLogin = () => {
    // 📱 ANDROID APP
    if (window.AndroidBridge && AndroidBridge.iniciarLogin) {
        AndroidBridge.iniciarLogin();
        return;
    }

    // 🌐 WEB
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    if (isMobile) {
        // Mobile → redirect (mais confiável)
        signInWithRedirect(auth, provider).catch(console.error);
    } else {
        // Desktop → popup (com fallback)
        signInWithPopup(auth, provider).catch((error) => {
            console.warn("Popup falhou, tentando redirect...", error);
            signInWithRedirect(auth, provider).catch(console.error);
        });
    }
};

// ======================================================
// 🚪 LOGOUT
// ======================================================
window.fazerLogout = async () => {
    try {
        await signOut(auth);

        if (window.AndroidBridge && AndroidBridge.fazerLogout) {
            AndroidBridge.fazerLogout();
        }

        console.log("Logout completo");
    } catch (error) {
        console.error("Erro no logout:", error);
    }
};

// ======================================================
// 📲 TOKEN ANDROID
// ======================================================
window.receberTokenGoogle = async (idToken) => {
    try {
        const credential = GoogleAuthProvider.credential(idToken);
        const result = await signInWithCredential(auth, credential);

        console.log("Login via Android:", result.user.displayName);
    } catch (error) {
        console.error("Erro login Android:", error);
    }
};

// ======================================================
// 🔁 REDIRECT RESULT (IMPORTANTE)
// ======================================================
getRedirectResult(auth)
    .then((result) => {
        if (result?.user) {
            console.log("Login web:", result.user.displayName);
        }
    })
    .catch(console.error);

// ======================================================
// 👀 AUTH STATE
// ======================================================
onAuthStateChanged(auth, (user) => {
    const btnAuth = document.getElementById('btn-auth');
    const authWarning = document.getElementById('auth-warning');

    if (unsubscribe) {
        unsubscribe();
        unsubscribe = null;
    }

    if (user) {
        if (btnAuth) {
            btnAuth.textContent = "Sair (Google)";
            btnAuth.onclick = window.fazerLogout;
        }

        if (authWarning) authWarning.style.display = 'none';

        escutarUsuario(user);

    } else {
        if (btnAuth) {
            btnAuth.textContent = "Login com Google";
            btnAuth.onclick = window.fazerLogin;
        }

        if (authWarning) authWarning.style.display = 'block';

        resetarEstado();
    }
});

// ======================================================
// 🔥 FIRESTORE
// ======================================================
function escutarUsuario(user) {
    const userRef = doc(db, "usuarios", user.uid);

    unsubscribe = onSnapshot(userRef, (docSnap) => {
        if (docSnap.exists()) {
            const dados = docSnap.data();

            window.totalBebido = dados.totalBebido || 0;
            window.metaDiaria = dados.metaDiaria || 2000;

            atualizarUI();

        } else {
            setDoc(userRef, {
                totalBebido: 0,
                metaDiaria: 2000
            });
        }
    });
}

// ======================================================
// 🎨 UI
// ======================================================
function atualizarUI() {
    if (typeof window.atualizarVisual === 'function') {
        window.atualizarVisual();
    }

    const inputMeta = document.getElementById('meta-input');
    if (inputMeta) inputMeta.value = window.metaDiaria;
}

function resetarEstado() {
    window.totalBebido = 0;

    if (typeof window.atualizarVisual === 'function') {
        window.atualizarVisual();
    }
}

// ======================================================
// 🌍 GLOBAL
// ======================================================
window.db = db;
window.auth = auth;
window.updateDoc = updateDoc;
window.doc = doc;
window.increment = increment;

</script>

  <!-- ============================================================
       📜 SCRIPTS EXTERNOS (LÓGICA DA APLICAÇÃO)
       Carregados após Firebase para garantir disponibilidade
       das funções expostas globalmente.
       ============================================================ -->
  <script src="scripts/bottles.js"></script>  <!-- Manipulação da garrafa SVG -->
  <script src="scripts/buttons.js"></script>  <!-- Controle dos botões e menu -->
  <script src="scripts/themes.js"></script>   <!-- Alternância de tema claro/escuro -->

  <!-- Rodapé vazio (pode ser usado futuramente) -->
  <footer></footer>

</body>
</html>
