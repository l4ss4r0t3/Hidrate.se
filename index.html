<!DOCTYPE html>
<html lang="pt-br">

<head>

  <!-- ============================================================
       CONFIGURAÇÕES BÁSICAS
       Define o conjunto de caracteres, escala para mobile e título.
       ============================================================ -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Hidrate.se | Sua garrafa de água digital.</title>

  <!-- Descrição exibida nos resultados de busca do Google -->
  <meta name="description" content="Hidrate.se: Use sua garrafa de água digital para controle seu consumo de água. Alcance sua meta de hidratação e cuide da sua saúde com a sua garrafa de água digital.">

  <!-- Folha de estilos principal -->
  <link rel="stylesheet" href="style.css?v=2">

  <!-- Cor da barra do navegador no Android/Chrome -->
  <meta name="theme-color" content="#74ccf4">

  <!-- ============================================================
       OPEN GRAPH (OG)
       Controla como o site aparece ao ser compartilhado em redes
       sociais como WhatsApp, Facebook, LinkedIn, etc.
       ============================================================ -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Hidrate.se | Sua garrafa de água digital.">
  <meta property="og:site_name" content="Hidrate.se">
  <meta property="og:description" content="Acompanhe sua meta de hidratação com uma garrafa de água digital e interativa.">

  <!-- Imagem de preview ao compartilhar o link -->
  <!-- Recomendado: 1200x630px. Imagens pequenas podem ser ignoradas por algumas plataformas. -->
  <meta property="og:image" content="https://hcontrol.rf.gd/images/favicon360.png">
  <meta property="og:image:width" content="360">
  <meta property="og:image:height" content="360">
  <meta property="og:image:type" content="image/png">

  <meta property="og:url" content="https://hcontrol.rf.gd/">
  <meta property="og:locale" content="pt_BR">

  <!-- ============================================================
       FAVICONS
       Ícones do site exibidos na aba do navegador, tela inicial
       do celular (apple-touch-icon) e atalhos do Android.
       ============================================================ -->
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="images/favicon48.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/favicon192.png">
  <link rel="apple-touch-icon" href="images/favicon180.png">

</head>

<body>

  <!-- ============================================================
       CABEÇALHO — MENU DROPDOWN
       O menu fica no canto superior direito e contém todos os
       controles do app: meta, água ingerida, botões e tema.
       A abertura/fechamento é controlada 100% pelo script.js.
       ============================================================ -->
  <header>
    <div class="dropdown">

      <!-- Botão que abre/fecha o menu (ícone hambúrguer em SVG) -->
      <button class="dropbtn" type="button" aria-label="Abrir Menu">
        <svg
          width="7mm"
          height="7mm"
          viewBox="0 0 7 7"
          preserveAspectRatio="xMidYMid meet"
          version="1.1"
          id="svg-menu"
          xmlns="http://www.w3.org/2000/svg">
          <!-- Três barras horizontais que formam o ícone hambúrguer -->
          <rect style="fill:black;stroke-width:0" width="5" height="1" x="1" y="1" />
          <rect style="fill:black;stroke-width:0" width="5" height="1" x="1" y="3" />
          <rect style="fill:black;stroke-width:0" width="5" height="1" x="1" y="5" />
        </svg>
      </button>

      <!-- Conteúdo do menu suspenso (oculto por padrão via CSS) -->
      <div class="dropdown-content">

        <!-- Meta diária -->
        <label for="meta-input" class="sr-only">Sua Meta Diária (ml)</label>
        <span class="input-wrapper">
        <span class="input-prefix">Meta</span>
        <input type="number" inputmode="numeric" id="meta-input" value="" placeholder="em ml.">
        </span>

        <!-- Água ingerida -->
        <label for="ml-input" class="sr-only">Água Ingerida (ml)</label>
        <span class="input-wrapper">
        <span class="input-prefix">Qtd.</span>
        <input type="number" inputmode="numeric" id="ml-input" placeholder="ingerida em ml.">
        </span>

        <!-- Registra a quantidade digitada e atualiza a garrafa -->
        <button type="button" id="btn-beber">Beber</button>

        <!-- Zera o progresso do dia após confirmação -->
        <button type="button" id="btn-zerar">Esvaziar</button>

        <!-- Alterna entre tema claro e escuro -->
        <button type="button" id="btn-tema">Mudar Tema</button>

        <!-- Link externo para o README do projeto no GitHub -->
        <a href="https://github.com/l4ss4r0t3/Hidrate.se/blob/main/README.md" target="_blank" class="menu-link">
          Manual / Ajuda
        </a>

      </div>
    </div>
  </header>

  <!-- ============================================================
       GARRAFA DIGITAL (SVG)
       Representação visual da garrafa de água.
       O nível da água é controlado dinamicamente pelo script.js,
       que altera os atributos "height" e "y" do retângulo #agua-nivel.

       Estrutura do SVG (viewBox: 6x12 unidades):
       - rect branco      → fundo interno da garrafa (área vazia)
       - rect azul        → nível da água (manipulado via JS)
       - rect preto esq.  → parede esquerda da garrafa
       - rect preto dir.  → parede direita da garrafa
       - rect preto inf.  → base da garrafa
       - rect preto sup.  → tampa da garrafa
       - text #texto-agua    → exibe o total ingerido (dentro da água)
       - text #texto-restante → exibe o restante ou "Meta Batida!"
       ============================================================ -->
  <main class="garrafa">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="32" viewBox="0 0 16 32">

  <!--
    ============================================================
    GARRAFA HIDRATE.SE — SVG VETORIAL
    Recriado pixel a pixel a partir do design original.

    CAMADAS (de baixo para cima):
    1. pixels_garrafa  — estrutura visual fiel ao PNG original
    2. agua-nivel      — retângulo de água manipulado pelo script.js
    3. texto-agua      — ml ingeridos (dentro da água)
    4. texto-restante  — ml restantes ou "Meta Batida!"

    INTEGRAÇÃO COM SCRIPT.JS:
    - ALTURA_MAX_SVG = 16  (interior preenchível: y=14 até y=30)
    - POSICAO_BASE_Y = 30  (base interna da garrafa)
    ============================================================
  -->

  <!-- Usa clipPath para respeitar os limites internos da garrafa -->
  <defs>
    <clipPath id="clip-interior">
      <rect x="1" y="7" width="14" height="24"/>
    </clipPath>
  </defs>
  <rect
    id="agua-nivel"
    x="1" y="31" width="14" height="0"
    fill="#000075" fill-opacity="0.55"
    clip-path="url(#clip-interior)"/>
