<svg xmlns="http://www.w3.org/2000/svg" width="16" height="32" viewBox="0 0 16 32">

<style>
  #agua-nivel {
    transition: all 1.5s ease;
  }
  </style>

  <!-- CAMADA 1: Clip e nível da água
       O clipPath restringe o retângulo de água ao interior da garrafa,
       impedindo que ele ultrapasse as bordas do SVG. -->
  <defs>
    <clipPath id="clip-interior">
      <rect x="1" y="7" width="14" height="24"/>
    </clipPath>
  </defs>

  <!-- Retângulo de água: começa com height=24 (cheio) e y=7 (topo do interior).
       O script.js reduz height e aumenta y proporcionalmente ao consumo. -->
  <rect
    id="agua-nivel"
    x="1" y="7" width="14" height="24"
    fill="#000075" fill-opacity="0.95"
    clip-path="url(#clip-interior)"/>

  <!-- CAMADA 2: Pixels da garrafa (arte pixel a pixel)
       Grupo com todos os retângulos 1x1 que formam o contorno e
       o brilho da garrafa. Fica na frente da água (z-order do SVG). -->
  <g id="pixels-garrafa">
    <rect x="5" y="0" width="6" height="1" fill="#000000" fill-opacity="1.0"/>
    <rect x="4" y="1" width="1" height="3" fill="#000000" fill-opacity="1.0"/>
    <rect x="11" y="1" width="1" height="3" fill="#000000" fill-opacity="1.0"/>
    <rect x="3" y="4" width="10" height="1" fill="#000000" fill-opacity="1.0"/>
    <rect x="1" y="5" width="2" height="1" fill="#000000" fill-opacity="1.0"/>
    <rect x="13" y="5" width="2" height="1" fill="#000000" fill-opacity="1.0"/>
    <rect x="14" y="6" width="1" height="21" fill="#000000" fill-opacity="1.0"/>
    <rect x="1" y="26" width="14" height="5" fill="#00FFFF" fill-opacity="0.300"/>
    <rect x="1" y="6" width="1" height="21" fill="#000000" fill-opacity="1.0"/>
    <rect x="15" y="29" width="1" height="1" fill="#000000" fill-opacity="1.0"/>
    <rect x="1" y="30" width="1" height="1" fill="#000000" fill-opacity="1.0"/>
    <rect x="14" y="30" width="1" height="1" fill="#000000" fill-opacity="1.0"/>
    <rect x="2" y="31" width="12" height="1" fill="#000000" fill-opacity="1.0"/>
    <rect x="5" y="1" width="1" height="3" fill="#00FFFF" fill-opacity="0.600"/>
    <rect x="6" y="1" width="1" height="3" fill="#00FFFF" fill-opacity="0.450"/>
    <rect x="7" y="1" width="4" height="3" fill="#00FFFF" fill-opacity="0.300"/>
    <rect x="3" y="5" width="2" height="1" fill="#00FFFF" fill-opacity="0.600"/>
    <rect x="5" y="5" width="8" height="1" fill="#00FFFF" fill-opacity="0.300"/>
    <rect x="2" y="6" width="2" height="1" fill="#00FFFF" fill-opacity="0.600"/>
    <rect x="4" y="6" width="10" height="1" fill="#00FFFF" fill-opacity="0.300"/>
    <rect x="2" y="7" width="1" height="20" fill="#00FFFF" fill-opacity="0.600"/>
    <rect x="3" y="26" width="1" height="1" fill="#00FFFF" fill-opacity="0.450"/>
    <rect x="1" y="27" width="1" height="2" fill="#00FFFF" fill-opacity="0.450"/>
    <rect x="14" y="27" width="1" height="2" fill="#00FFFF" fill-opacity="0.450"/>
    <rect x="1" y="29" width="1" height="1" fill="#00FFFF" fill-opacity="0.600"/>
    <rect x="2" y="29" width="1" height="1" fill="#00FFFF" fill-opacity="0.450"/>
    <rect x="13" y="29" width="1" height="1" fill="#00FFFF" fill-opacity="0.450"/>
    <rect x="14" y="29" width="1" height="1" fill="#00FFFF" fill-opacity="0.600"/>
    <rect x="2" y="30" width="1" height="1" fill="#00FFFF" fill-opacity="0.600"/>
    <rect x="3" y="30" width="3" height="1" fill="#00FFFF" fill-opacity="0.450"/>
    <rect x="7" y="30" width="1" height="1" fill="#00FFFF" fill-opacity="0.300"/>
    <rect x="9" y="30" width="1" height="1" fill="#00FFFF" fill-opacity="0.300"/>
    <rect x="10" y="30" width="3" height="1" fill="#00FFFF" fill-opacity="0.450"/>
    <rect x="13" y="30" width="1" height="1" fill="#00FFFF" fill-opacity="0.600"/>
  </g>

  <!-- CAMADA 3: Rótulo no interior da garrafa (centralizado em y=14 a y=19) -->

  <!-- Numerador: ml restantes (ou "Meta" quando a meta é atingida) -->
  <text
    id="texto-ingerido"
    x="8" y="16"
    font-size="1.5"
    text-anchor="middle"
    fill="#00FFFF"
    font-family="Google Sans, sans-serif">
  </text>

  <!-- Linha divisória da fração — oculta via JS quando meta é atingida -->
  <line
    id="linha-fracao"
    x1="4" y1="17" x2="12" y2="17"
    stroke="#00FFFF" stroke-width="0.2"/>

  <!-- Denominador: meta diária em ml -->
  <text
    id="texto-meta"
    x="8" y="19"
    font-size="1.5"
    text-anchor="middle"
    fill="#00FFFF"
    font-family="Google Sans, sans-serif">
  </text>

  </svg>