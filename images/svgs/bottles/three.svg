<svg xmlns="http://www.w3.org/2000/svg" width="16" height="32" viewBox="0 0 16 32">

<style>
  #agua-nivel {
    transition: all 1.5s ease;
  }
  </style>

  <!-- CAMADA 1: Clip e nível da água
       O clipPath restringe o retângulo de água ao interior da garrafa,
       impedindo que ele ultrapasse as bordas do SVG. -->
  <defs>
    <clipPath id="clip-interior">
      <rect x="1" y="7" width="14" height="24"/>
    </clipPath>
  </defs>

  <!-- Retângulo de água: começa com height=24 (cheio) e y=7 (topo do interior).
       O script.js reduz height e aumenta y proporcionalmente ao consumo. -->
  <rect
    id="agua-nivel"
    x="1" y="7" width="14" height="24"
    fill="#000075" fill-opacity="0.95"
    clip-path="url(#clip-interior)"/>

