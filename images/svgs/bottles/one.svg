<svg xmlns="http://www.w3.org/2000/svg" width="16" height="32" viewBox="0 0 16 32">

  <style>
  #agua-nivel {
    transition: all 1.5s ease;
  }
  </style>

  <!-- CAMADA 1: Clip e nível da água -->
  <defs>
    <clipPath id="clip-interior">
      <rect x="1" y="7" width="14" height="24"/>
    </clipPath>  
  </defs>

  <!-- Retângulo de água -->
  <rect
    id="agua-nivel"
    x="1" y="7" width="14" height="24"
    fill="#000075" fill-opacity="0.95"
    clip-path="url(#clip-interior)"/>

  <!-- CAMADA 2: Estrutura da garrafa (simplificada) -->
  <g id="pixels-garrafa">
    <rect x="5" y="0" width="6" height="1" fill="#000000"/>
    <rect x="4" y="1" width="8" height="2" fill="#FEBE00"/>
    <rect x="1" y="3" width="14" height="28" fill="none" stroke="#000000" stroke-width="0.5"/>
  </g>

  <!-- CAMADA 3: Rótulo -->
  <text
    id="texto-ingerido"
    x="8" y="16"
    font-size="1.5"
    text-anchor="middle"
    fill="#FEBE00"
    font-family="Google Sans, sans-serif">
  </text>

  <line
    id="linha-fracao"
    x1="4" y1="17" x2="12" y2="17"
    stroke="#FEBE00" stroke-width="0.2"/>

  <text
    id="texto-meta"
    x="8" y="19"
    font-size="1.5"
    text-anchor="middle"
    fill="#FEBE00"
    font-family="Google Sans, sans-serif">
  </text>

</svg>